name: Verification Report Generation

on:
  push:
    tags:
      - 'v*'           # Trigger on version tags: v1.0.0, v2.1.3, etc.
  workflow_dispatch:
    inputs:
      report_title:
        description: 'Custom report title'
        required: false
        default: 'PIL Automotive Controller Verification Report'

env:
  MATLAB_VERSION: R2024a

jobs:
  generate-report:
    name: Generate Full Verification Report (PDF)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="dev-$(date +%Y%m%d)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Report version: $VERSION"

      - name: Download latest MIL results
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: mil-tests.yml
          branch: main
          path: reports/mil/
        continue-on-error: true

      - name: Download latest PIL results
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: pil-tests.yml
          branch: main
          path: reports/pil/
        continue-on-error: true

      - name: Download coverage report
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: coverage.yml
          branch: main
          name: merged-coverage-report
          path: reports/coverage/
        continue-on-error: true

      - name: Download Polyspace results
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: polyspace.yml
          branch: main
          path: reports/polyspace/
        continue-on-error: true

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: ${{ env.MATLAB_VERSION }}
          products: >
            Simulink
            Simulink_Report_Generator
            Simulink_Test
            Simulink_Coverage
            Embedded_Coder
            Requirements_Toolbox

      - name: Generate verification report
        uses: matlab-actions/run-command@v2
        with:
          command: |
            addpath(genpath('.'));
            reportTitle = '${{ github.event.inputs.report_title }}';
            if isempty(reportTitle)
              reportTitle = 'PIL Automotive Controller Verification Report';
            end
            reportVersion = '${{ steps.version.outputs.version }}';
            run('scripts/generate_report.m');

      - name: Verify report was generated
        run: |
          if [ ! -f "reports/Verification_Report_${{ steps.version.outputs.version }}.pdf" ]; then
            echo "::error::Verification report PDF was not generated"
            exit 1
          fi
          echo "Report generated: $(du -h reports/Verification_Report_*.pdf | cut -f1) MB"

      - name: Upload verification report
        uses: actions/upload-artifact@v4
        with:
          name: verification-report-${{ steps.version.outputs.version }}
          path: |
            reports/Verification_Report_*.pdf
            reports/Requirements_Traceability_Matrix_*.xlsx
          retention-days: 365

      - name: Create GitHub Release with report
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            reports/Verification_Report_*.pdf
            reports/Requirements_Traceability_Matrix_*.xlsx
          body: |
            ## Verification Report ${{ steps.version.outputs.version }}

            This release includes the complete PIL automotive controller verification pack:

            ### Contents
            - **Verification Report PDF** — Full MIL/PIL results, requirements traceability, coverage data, and Polyspace analysis
            - **Requirements Traceability Matrix** — All requirements mapped to test cases and results

            ### Controllers Verified
            - Anti-Lock Braking System (ABS)
            - Tire Pressure Monitoring System (TPMS)
            - Automatic Climate Control

            ### Test Platform
            - Virtual Arm Cortex-M7 (Arm Fast Models ${{ env.ARM_FAST_MODELS_VERSION }})
            - MATLAB/Simulink ${{ env.MATLAB_VERSION }}

            ### Standards
            - ISO 26262 workflow compliance
            - MISRA C:2012 (via Polyspace)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-completion:
    name: Notify Completion
    runs-on: ubuntu-latest
    needs: generate-report
    if: always()

    steps:
      - name: Post job summary
        run: |
          echo "## Verification Report Generation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ needs.generate-report.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.generate-report.result }}" == "success" ]; then
            echo "Report artifact available in workflow run artifacts."
          else
            echo "::warning::Report generation did not complete successfully."
          fi
