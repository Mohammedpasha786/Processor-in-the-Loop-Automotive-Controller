name: Processor-in-the-Loop (PIL) Tests — Arm Cortex-M7

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/pil_tests/**'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      controller:
        description: 'Which controller to test'
        required: true
        default: 'all'
        type: choice
        options: [all, abs, tpms, climate]

env:
  MATLAB_VERSION: R2024a
  ARM_FAST_MODELS_VERSION: '11.27'
  RESULTS_DIR: reports/pil

concurrency:
  group: pil-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Code Generation (shared prerequisite)
  # ─────────────────────────────────────────────
  codegen:
    name: Generate C Code (Embedded Coder)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: ${{ env.MATLAB_VERSION }}
          products: >
            Simulink
            Embedded_Coder
            MATLAB_Coder

      - name: Generate C code for all controllers
        uses: matlab-actions/run-command@v2
        with:
          command: |
            addpath(genpath('.'));
            run('scripts/generate_code.m');
            disp('Code generation complete for ABS, TPMS, Climate controllers');

      - name: Cache generated code
        uses: actions/upload-artifact@v4
        with:
          name: generated-c-code
          path: |
            src/abs_controller/codegen/
            src/tpms_controller/codegen/
            src/climate_controller/codegen/
          retention-days: 1

  # ─────────────────────────────────────────────
  # Job 2: PIL — ABS Controller
  # ─────────────────────────────────────────────
  pil-abs:
    name: PIL — ABS on Cortex-M7
    runs-on: ubuntu-latest
    needs: codegen
    timeout-minutes: 90
    if: >
      github.event.inputs.controller == 'all' ||
      github.event.inputs.controller == 'abs' ||
      github.event_name != 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-c-code

      - name: Install Arm Fast Models
        run: |
          echo "Installing Arm Fast Models ${{ env.ARM_FAST_MODELS_VERSION }}"
          # In real CI, install from Arm Developer portal or cached artifact
          # sudo apt-get install -y arm-fast-models
          echo "ARM_FAST_MODELS_ROOT=/opt/arm/FastModels" >> $GITHUB_ENV

      - name: Set up MATLAB + Fast Models Support Package
        uses: matlab-actions/setup-matlab@v2
        with:
          release: ${{ env.MATLAB_VERSION }}
          products: >
            Simulink
            Simulink_Test
            Simulink_Coverage
            Embedded_Coder

      - name: Run ABS PIL Tests on Cortex-M7
        uses: matlab-actions/run-command@v2
        with:
          command: |
            addpath(genpath('.'));
            % Configure PIL mode for ABS subsystem
            load_system('src/abs_controller/ABS_Controller');
            set_param('ABS_Controller/ABS_Controller_Subsystem', ...
                      'SimulationMode', 'PIL');
            % Run PIL test suite
            results = runtests('tests/pil_tests/ABS_PIL_Tests.mldatx');
            rt = table(results);
            disp(rt);
            % Save PIL results
            save('reports/pil/ABS_PIL_Results.mat', 'results');
            assert(all([results.Passed]), 'One or more ABS PIL tests FAILED');

      - name: Extract execution profiling data
        uses: matlab-actions/run-command@v2
        with:
          command: |
            addpath(genpath('.'));
            run('scripts/extract_execution_profile.m');
        if: always()

      - name: Upload ABS PIL results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: abs-pil-results
          path: reports/pil/ABS_*
          retention-days: 30

  # ─────────────────────────────────────────────
  # Job 3: PIL — TPMS Controller
  # ─────────────────────────────────────────────
  pil-tpms:
    name: PIL — TPMS on Cortex-M7
    runs-on: ubuntu-latest
    needs: codegen
    timeout-minutes: 90
    if: >
      github.event.inputs.controller == 'all' ||
      github.event.inputs.controller == 'tpms' ||
      github.event_name != 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-c-code

      - name: Install Arm Fast Models
        run: |
          echo "ARM_FAST_MODELS_ROOT=/opt/arm/FastModels" >> $GITHUB_ENV

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: ${{ env.MATLAB_VERSION }}
          products: Simulink Simulink_Test Simulink_Coverage Embedded_Coder

      - name: Run TPMS PIL Tests on Cortex-M7
        uses: matlab-actions/run-command@v2
        with:
          command: |
            addpath(genpath('.'));
            load_system('src/tpms_controller/TPMS_Controller');
            set_param('TPMS_Controller/TPMS_Controller_Subsystem', ...
                      'SimulationMode', 'PIL');
            results = runtests('tests/pil_tests/TPMS_PIL_Tests.mldatx');
            rt = table(results);
            disp(rt);
            save('reports/pil/TPMS_PIL_Results.mat', 'results');
            assert(all([results.Passed]), 'One or more TPMS PIL tests FAILED');

      - name: Upload TPMS PIL results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tpms-pil-results
          path: reports/pil/TPMS_*
          retention-days: 30

  # ─────────────────────────────────────────────
  # Job 4: PIL — Climate Controller
  # ─────────────────────────────────────────────
  pil-climate:
    name: PIL — Climate on Cortex-M7
    runs-on: ubuntu-latest
    needs: codegen
    timeout-minutes: 90
    if: >
      github.event.inputs.controller == 'all' ||
      github.event.inputs.controller == 'climate' ||
      github.event_name != 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-c-code

      - name: Install Arm Fast Models
        run: |
          echo "ARM_FAST_MODELS_ROOT=/opt/arm/FastModels" >> $GITHUB_ENV

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: ${{ env.MATLAB_VERSION }}
          products: Simulink Simulink_Test Simulink_Coverage Embedded_Coder

      - name: Run Climate PIL Tests on Cortex-M7
        uses: matlab-actions/run-command@v2
        with:
          command: |
            addpath(genpath('.'));
            load_system('src/climate_controller/Climate_Controller');
            set_param('Climate_Controller/Climate_Controller_Subsystem', ...
                      'SimulationMode', 'PIL');
            results = runtests('tests/pil_tests/Climate_PIL_Tests.mldatx');
            rt = table(results);
            disp(rt);
            save('reports/pil/Climate_PIL_Results.mat', 'results');
            assert(all([results.Passed]), 'One or more Climate PIL tests FAILED');

      - name: Upload Climate PIL results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: climate-pil-results
          path: reports/pil/Climate_*
          retention-days: 30

  # ─────────────────────────────────────────────
  # Job 5: PIL Numerical Equivalence Check
  # ─────────────────────────────────────────────
  pil-equivalence-check:
    name: MIL vs PIL Numerical Equivalence
    runs-on: ubuntu-latest
    needs: [pil-abs, pil-tpms, pil-climate]
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all PIL results
        uses: actions/download-artifact@v4
        with:
          path: reports/pil/

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: ${{ env.MATLAB_VERSION }}
          products: Simulink

      - name: Run equivalence comparison
        uses: matlab-actions/run-command@v2
        with:
          command: |
            addpath(genpath('.'));
            run('scripts/compare_mil_pil_outputs.m');

      - name: Upload equivalence report
        uses: actions/upload-artifact@v4
        with:
          name: pil-equivalence-report
          path: reports/pil/equivalence_report.*
          retention-days: 30

  # ─────────────────────────────────────────────
  # Job 6: Execution Time Analysis
  # ─────────────────────────────────────────────
  execution-time-analysis:
    name: Execution Time Profiling
    runs-on: ubuntu-latest
    needs: [pil-abs, pil-tpms, pil-climate]
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download PIL results
        uses: actions/download-artifact@v4
        with:
          path: reports/pil/

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: ${{ env.MATLAB_VERSION }}
          products: Simulink Embedded_Coder

      - name: Analyze execution times
        uses: matlab-actions/run-command@v2
        with:
          command: |
            addpath(genpath('.'));
            run('scripts/analyze_execution_time.m');

      - name: Post execution summary
        run: |
          echo "## Cortex-M7 Execution Time Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Controller | Sample Period | Max Exec Time | Margin |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------------|---------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| ABS        | 1 ms         | See artifact  | TBD    |" >> $GITHUB_STEP_SUMMARY
          echo "| TPMS       | 10 ms        | See artifact  | TBD    |" >> $GITHUB_STEP_SUMMARY
          echo "| Climate    | 100 ms       | See artifact  | TBD    |" >> $GITHUB_STEP_SUMMARY

      - name: Upload execution profile
        uses: actions/upload-artifact@v4
        with:
          name: execution-profile
          path: reports/pil/execution_profile.*
          retention-days: 30
