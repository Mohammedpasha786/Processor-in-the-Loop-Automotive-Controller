name: Coverage Merge & Reporting

on:
  workflow_run:
    workflows: ["Model-in-the-Loop (MIL) Tests", "Processor-in-the-Loop (PIL) Tests — Arm Cortex-M7"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  MATLAB_VERSION: R2024a
  COVERAGE_THRESHOLD: 95

jobs:
  merge-coverage:
    name: Merge MIL + PIL Coverage (Target ≥95%)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: >
      github.event.workflow_run.conclusion == 'success' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download MIL coverage artifacts
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: mil-tests.yml
          name: mil-coverage-report
          path: reports/coverage/mil/

      - name: Download PIL results
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: pil-tests.yml
          name: abs-pil-results
          path: reports/coverage/pil/abs/

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: ${{ env.MATLAB_VERSION }}
          products: Simulink Simulink_Coverage Embedded_Coder

      - name: Merge MIL and PIL coverage
        uses: matlab-actions/run-command@v2
        with:
          command: |
            addpath(genpath('.'));
            run('scripts/merge_coverage.m');

      - name: Check 95% coverage gate
        uses: matlab-actions/run-command@v2
        with:
          command: |
            addpath(genpath('.'));
            load('reports/coverage/merged_coverage.mat', 'coverageData');
            decisionCoverage = coverageData.DecisionCoverage;
            mcdc = coverageData.MCDCCoverage;
            threshold = ${{ env.COVERAGE_THRESHOLD }};
            fprintf('Decision Coverage: %.1f%%\n', decisionCoverage);
            fprintf('MC/DC Coverage:    %.1f%%\n', mcdc);
            if decisionCoverage < threshold
              error('Decision coverage %.1f%% below threshold %d%%', decisionCoverage, threshold);
            end
            if mcdc < threshold
              error('MC/DC coverage %.1f%% below threshold %d%%', mcdc, threshold);
            end
            disp('Coverage gate PASSED');

      - name: Generate HTML coverage report
        uses: matlab-actions/run-command@v2
        with:
          command: |
            addpath(genpath('.'));
            run('scripts/generate_coverage_html.m');

      - name: Post coverage summary
        run: |
          echo "## Coverage Summary (MIL + PIL Merged)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Result | Target |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Decision Coverage | See artifact | ≥95% |" >> $GITHUB_STEP_SUMMARY
          echo "| Statement Coverage | See artifact | ≥95% |" >> $GITHUB_STEP_SUMMARY
          echo "| MC/DC Coverage | See artifact | ≥95% |" >> $GITHUB_STEP_SUMMARY

      - name: Upload merged coverage
        uses: actions/upload-artifact@v4
        with:
          name: merged-coverage-report
          path: reports/coverage/merged_*
          retention-days: 90

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-report
          path: reports/coverage/html/
          retention-days: 90

  coverage-badge:
    name: Update Coverage Badge
    runs-on: ubuntu-latest
    needs: merge-coverage
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download coverage data
        uses: actions/download-artifact@v4
        with:
          name: merged-coverage-report
          path: reports/coverage/

      - name: Update badge in README
        run: |
          echo "Coverage badge update would be performed here"
          # In practice: parse coverage percentage and update shields.io badge URL in README
